        "@type": "Place",

<body class="bg-black text-white h-screen w-screen overflow-hidden flex items-center justify-center">
  <main class="container">
    <div class="video-container">
      <img src="./assets/ZING_BACKGROUND_LOGOMARK.webp" alt="Zing Studios" class="video">

    </div>
  </main>
  
  <script>
    var video = document.querySelector('.video');
            var fallback = document.querySelector('.fallback');
    var playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.catch(function() {
        video.style.display = 'none';
        fallback.style.display = 'block';
      });
    }
  </script>
